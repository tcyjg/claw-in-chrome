name: Release Extension

"on":
  push:
    branches:
      - main
    paths:
      - "claw in chrome/manifest.json"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./claw in chrome/manifest.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manifest version must use four numeric segments, got: ${VERSION}" >&2
            exit 1
          fi

          BEFORE_SHA="${{ github.event.before }}"
          PREVIOUS_VERSION=""
          if [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "${BEFORE_SHA}:claw in chrome/manifest.json" 2>/dev/null; then
              PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:claw in chrome/manifest.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const parsed = JSON.parse(data); process.stdout.write(String(parsed.version || '')); });")"
            fi
          fi

          if [[ -n "${PREVIOUS_VERSION}" ]] && [[ "${PREVIOUS_VERSION}" == "${VERSION}" ]]; then
            echo "Version did not change, skipping release."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Refusing to publish duplicate release." >&2
            exit 1
          fi

          if [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            NOTES="$(git log --format='- %s' "${BEFORE_SHA}..HEAD")"
          else
            NOTES="$(git log --format='- %s' -n 20 HEAD)"
          fi
          if [[ -z "${NOTES// }" ]]; then
            NOTES="Release ${TAG}"
          fi

          ZIP_NAME="claw-in-chrome-v${VERSION}.zip"
          ZIP_PATH="${RUNNER_TEMP}/${ZIP_NAME}"
          NOTES_PATH="${RUNNER_TEMP}/release-notes.md"
          LATEST_JSON_PATH="${RUNNER_TEMP}/latest.json"

          printf '%s\n' "${NOTES}" > "${NOTES_PATH}"

          export RELEASE_VERSION="${VERSION}"
          export RELEASE_NOTES="${NOTES}"
          export LATEST_JSON_PATH
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          const notes = process.env.RELEASE_NOTES || "";
          const payload = {
            version,
            published_at: new Date().toISOString(),
            release_url: `https://github.com/S-Trespassing/claw-in-chrome/releases/tag/v${version}`,
            download_url: `https://github.com/S-Trespassing/claw-in-chrome/releases/download/v${version}/claw-in-chrome-v${version}.zip`,
            notes,
            min_supported_version: version
          };
          fs.writeFileSync(process.env.LATEST_JSON_PATH, JSON.stringify(payload, null, 2) + "\n");
          NODE

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_OUTPUT}"
          echo "notes_path=${NOTES_PATH}" >> "${GITHUB_OUTPUT}"
          echo "latest_json_path=${LATEST_JSON_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create release tag
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.meta.outputs.tag }}" -m "Release ${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Create release archive
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"
          zip -r "${{ steps.meta.outputs.zip_path }}" "claw in chrome"

      - name: Publish GitHub Release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Claw in Chrome v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes_path }}
          files: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.latest_json_path }}
          make_latest: true
          overwrite_files: true
