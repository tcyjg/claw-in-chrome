name: Release Extension

"on":
  push:
    branches:
      - main
    paths:
      - manifest.json
  workflow_dispatch:
    inputs:
      min_supported_version:
        description: Optional minimum supported extension version (four numeric segments). Leave blank to avoid forcing an upgrade.
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./manifest.json').version")"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Manifest version must use four numeric segments, got: ${VERSION}" >&2
            exit 1
          fi

          RAW_MANUAL_MIN_SUPPORTED="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.min_supported_version || '' }}"
          MANUAL_MIN_SUPPORTED="$(printf '%s' "${RAW_MANUAL_MIN_SUPPORTED}" | tr -d '\r' | xargs)"
          if [[ -n "${MANUAL_MIN_SUPPORTED}" ]] && [[ ! "${MANUAL_MIN_SUPPORTED}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "min_supported_version must use four numeric segments, got: ${MANUAL_MIN_SUPPORTED}" >&2
            exit 1
          fi

          BEFORE_SHA="${{ github.event.before }}"
          PREVIOUS_VERSION=""
          if [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "${BEFORE_SHA}:manifest.json" 2>/dev/null; then
              PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:manifest.json" | node -e "let data=''; process.stdin.on('data', chunk => data += chunk); process.stdin.on('end', () => { const parsed = JSON.parse(data); process.stdout.write(String(parsed.version || '')); });")"
            fi
          fi

          if [[ -n "${PREVIOUS_VERSION}" ]] && [[ "${PREVIOUS_VERSION}" == "${VERSION}" ]]; then
            echo "Version did not change, skipping release."
            echo "should_release=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          TAG="v${VERSION}"
          PREVIOUS_TAG=""
          if [[ -n "${PREVIOUS_VERSION}" ]]; then
            CANDIDATE_PREVIOUS_TAG="v${PREVIOUS_VERSION}"
            if git rev-parse -q --verify "refs/tags/${CANDIDATE_PREVIOUS_TAG}" >/dev/null; then
              PREVIOUS_TAG="${CANDIDATE_PREVIOUS_TAG}"
            fi
          fi
          if [[ -z "${PREVIOUS_TAG}" ]]; then
            PREVIOUS_TAG="$(git tag --list 'v*' --sort=-version:refname | grep -Fvx "${TAG}" | head -n 1 || true)"
          fi

          if [[ -n "${PREVIOUS_TAG}" ]]; then
            NOTES="$(git log --format='- %s' "${PREVIOUS_TAG}..HEAD")"
          elif [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            NOTES="$(git log --format='- %s' "${BEFORE_SHA}..HEAD")"
          else
            NOTES="$(git log --format='- %s' -n 20 HEAD)"
          fi
          if [[ -z "${NOTES// }" ]]; then
            NOTES="Release ${TAG}"
          fi

          ZIP_NAME="claw-in-chrome-v${VERSION}.zip"
          ZIP_PATH="${RUNNER_TEMP}/${ZIP_NAME}"
          NOTES_PATH="${RUNNER_TEMP}/release-notes.md"
          LATEST_JSON_PATH="${RUNNER_TEMP}/latest.json"

          printf '%s\n' "${NOTES}" > "${NOTES_PATH}"

          export RELEASE_VERSION="${VERSION}"
          export RELEASE_NOTES="${NOTES}"
          export RELEASE_MIN_SUPPORTED_VERSION="${MANUAL_MIN_SUPPORTED}"
          export LATEST_JSON_PATH
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;
          const notes = process.env.RELEASE_NOTES || "";
          const minSupportedVersion = String(process.env.RELEASE_MIN_SUPPORTED_VERSION || "").trim();
          const payload = {
            version,
            published_at: new Date().toISOString(),
            release_url: `https://github.com/S-Trespassing/claw-in-chrome/releases/tag/v${version}`,
            download_url: `https://github.com/S-Trespassing/claw-in-chrome/releases/download/v${version}/claw-in-chrome-v${version}.zip`,
            notes
          };
          if (minSupportedVersion) {
            payload.min_supported_version = minSupportedVersion;
          }
          fs.writeFileSync(process.env.LATEST_JSON_PATH, JSON.stringify(payload, null, 2) + "\n");
          NODE

          echo "should_release=true" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "zip_path=${ZIP_PATH}" >> "${GITHUB_OUTPUT}"
          echo "notes_path=${NOTES_PATH}" >> "${GITHUB_OUTPUT}"
          echo "latest_json_path=${LATEST_JSON_PATH}" >> "${GITHUB_OUTPUT}"

      - name: Create release archive
        if: steps.meta.outputs.should_release == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd "${GITHUB_WORKSPACE}"

          PACKAGE_ITEMS=(
            assets
            i18n
            sounds
            blocked.html
            claude_icon.svg
            claw-contract.js
            custom-provider-models.js
            custom-provider-settings.js
            gif.js
            gif.worker.js
            gif_viewer.html
            gif_viewer.js
            github-update-options.js
            github-update-shared.js
            github-update-sidepanel.js
            github-update-worker.js
            github-update-worker-runtime.js
            icon-128.png
            managed_schema.json
            manifest.json
            mcp-permission-popup-protocol.js
            offscreen.html
            offscreen.js
            options-debug-logger.js
            options.html
            options-update-enhancer.js
            pairing.html
            provider-format-adapter.js
            service-worker-runtime.js
            service-worker-loader.js
            service-worker-detached-window-runtime.js
            sidepanel-debug-logger.js
            sidepanel-inline-provider.css
            sidepanel-inline-provider.js
            sidepanel.html
            theme-init.js
          )

          MISSING_ITEMS=()
          for item in "${PACKAGE_ITEMS[@]}"; do
            if [[ ! -e "${item}" ]]; then
              MISSING_ITEMS+=("${item}")
            fi
          done

          if [[ ${#MISSING_ITEMS[@]} -gt 0 ]]; then
            printf 'Missing package item: %s\n' "${MISSING_ITEMS[@]}" >&2
            exit 1
          fi

          zip -r "${{ steps.meta.outputs.zip_path }}" "${PACKAGE_ITEMS[@]}"

      - name: Publish GitHub Release
        if: steps.meta.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Claw in Chrome v${{ steps.meta.outputs.version }}
          body_path: ${{ steps.meta.outputs.notes_path }}
          files: |
            ${{ steps.meta.outputs.zip_path }}
            ${{ steps.meta.outputs.latest_json_path }}
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
